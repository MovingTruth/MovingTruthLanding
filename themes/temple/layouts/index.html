<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Site.Title }}</title>
  <meta name="description" content="{{ .Site.Params.tagline }}" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="{{ .Site.Title }}" />
  <meta property="og:title" content="{{ .Site.Title }}" />
  <meta property="og:description" content="{{ .Site.Params.tagline }}" />
  <meta property="og:url" content="{{ .Site.BaseURL }}" />
  <meta property="og:image" content="{{ "logo.png" | absURL }}" />
  <meta name="twitter:card" content="summary" />
  <link rel="preload" as="image" href="/desktop_doorway.jpg" media="(min-width: 769px)" />
  <link rel="preload" as="image" href="/mobile_doorway.jpg" media="(max-width: 768px)" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  {{ $css := resources.Get "css/temple.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.Permalink }}" integrity="{{ $css.Data.Integrity }}" />
</head>
<body class="landing-doorway">

  <div class="ld-bg"></div>
  <div class="ld-overlay"></div>

  <main class="ld-content">
    <h1 class="ld-title">{{ .Site.Title }}</h1>
    <p class="ld-tagline">{{ .Site.Params.tagline }}</p>
    <a href="{{ "choose" | relURL }}" class="ld-enter-btn">Enter Your Inner Temple<br><span>and learn.</span></a>
  </main>

  <div class="ld-bottom">
    <img src="/logo.png" alt="" class="ld-logo" aria-hidden="true" />
    {{ if .Site.Params.showSubtitle }}
    <p class="ld-author">by {{ .Site.Params.author }}</p>
    {{ end }}
  </div>

  <script>
  (function () {
    var THEME_KEY    = 'mt_theme';
    var REMEMBER_KEY = 'mt_theme_remember';
    function sGet(s, k) { try { return s.getItem(k); } catch (e) { return null; } }
    if (sGet(localStorage, THEME_KEY) && sGet(localStorage, REMEMBER_KEY)) {
      var btn = document.querySelector('.ld-enter-btn');
      if (btn) btn.href = '{{ "series" | relURL }}';
    }
  })();
  </script>

</body>
</html>
