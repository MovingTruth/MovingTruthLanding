<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .Title }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.tagline }}{{ end }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ "css/temple.css" | relURL }}" />
</head>
<body class="inner">

  <header class="site-header">
    <a href="{{ "/" | relURL }}" class="site-logo">{{ .Site.Title }}</a>
    <nav>
      <a href="{{ "series" | relURL }}">Series</a>
    </nav>
  </header>

  <main class="inner-content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <p>{{ .Site.Title }} &mdash; {{ .Site.Params.author }}</p>
  </footer>

</body>
</html>
