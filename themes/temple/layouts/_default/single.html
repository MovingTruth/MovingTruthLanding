{{ define "main" }}

<article class="piece">

  <header class="piece-header">
    <div class="piece-meta">
      <span class="piece-series"><a href="{{ .Parent.Permalink }}">{{ .Params.series }}</a></span>
      {{ with .Params.part }}<span class="piece-number">Part {{ . }}</span>{{ end }}
    </div>
    <h1 class="piece-title">{{ .Title }}</h1>
    <time class="piece-date">{{ .Date.Format "January 2, 2006" }}</time>
  </header>

  <div class="piece-body">
    {{ .Content }}
  </div>

  <nav class="piece-nav">
    {{ with .NextInSection }}
    <a href="{{ .Permalink }}" class="piece-nav-prev">
      <span class="nav-label">← Previous</span>
      <span class="nav-title">{{ .Title }}</span>
    </a>
    {{ else }}
    <span></span>
    {{ end }}

    <a href="{{ .Parent.Permalink }}" class="piece-nav-series">All Parts</a>

    {{ with .PrevInSection }}
    <a href="{{ .Permalink }}" class="piece-nav-next">
      <span class="nav-label">Next →</span>
      <span class="nav-title">{{ .Title }}</span>
    </a>
    {{ end }}
  </nav>

</article>

{{ end }}
