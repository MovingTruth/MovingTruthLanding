notice_title: 시작하기 전에
notice_body_1: 이 이야기들은 순서대로 읽도록 쓰였습니다. 각 시리즈는 독자적인 길입니다 — 원하는 시리즈부터 시작할 수 있지만, 시리즈 안에서는 첫 번째 편부터 순서대로 따라가세요.
notice_body_2: 각 편의 끝에 도달하면, 다음으로 넘어가기 전에 30초 동안 그것과 함께 있을 것을 요청받게 됩니다. 시리즈를 다 읽고 나면, 언제든지 어느 부분으로든 자유롭게 돌아올 수 있습니다.
notice_body_3: 언제든지 진행 상황을 초기화하고 다시 처음부터 시작할 수 있습니다.
