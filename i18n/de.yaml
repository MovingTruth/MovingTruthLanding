notice_title: Bevor du beginnst
notice_body_1: Diese Geschichten sind dazu gedacht, der Reihe nach gelesen zu werden. Jede Serie ist ihr eigener Weg — du kannst jede Serie beginnen, wann du möchtest, aber innerhalb einer Serie folgst du den Teilen vom ersten an.
notice_body_2: Wenn du das Ende eines Teils erreichst, wirst du gebeten, dreißig Sekunden damit zu verweilen, bevor du weitermachst. Sobald du eine Serie durchgelesen hast, kannst du jederzeit zu jedem Teil zurückkehren.
notice_body_3: Du kannst deinen Fortschritt jederzeit zurücksetzen und von vorne beginnen.
