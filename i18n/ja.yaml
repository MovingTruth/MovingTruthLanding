notice_title: 始める前に
notice_body_1: これらのストーリーは順番に読むように書かれています。各シリーズは独自の道です——いつでも任意のシリーズを始めることができますが、シリーズ内では最初のパートから順に読み進めます。
notice_body_2: パートの終わりに達したとき、次に進む前に三十秒間それと共に過ごすよう求められます。シリーズを全て読み終えたら、いつでも任意のパートに戻ることができます。
notice_body_3: いつでも進捗をリセットして最初からやり直すことができます。
