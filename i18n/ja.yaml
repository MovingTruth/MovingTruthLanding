mission_statement: Moving Truthは招待であり、指示ではありません。
mission_ask_1: 私たちはあなたに信じることを求めません。
mission_ask_2: 私たちはあなたに好奇心を持つことを求めます。
mission_ask_3: あなたが知っていることに疑問を持つこと。
mission_ask_4: あなたが受け継いだものを検討すること。
mission_ask_5: 誠実さをもってアイデアを比較すること。
mission_ask_6: 証拠、経験、歴史、知恵がどこへ導こうとも、それに従うこと。
