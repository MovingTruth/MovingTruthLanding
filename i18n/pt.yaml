notice_title: Antes de começar
notice_body_1: Estas histórias são escritas para serem lidas em ordem. Cada série é o seu próprio caminho — você pode começar qualquer série quando quiser, mas dentro de uma série você segue as partes desde a primeira.
notice_body_2: Quando você chegar ao final de uma parte, será pedido que fique com ela por trinta segundos antes de continuar. Depois de ler uma série completa, você é livre para voltar a qualquer parte a qualquer momento.
notice_body_3: Você sempre pode redefinir seu progresso e começar de novo.
