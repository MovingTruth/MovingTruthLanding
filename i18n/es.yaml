notice_title: Antes de comenzar
notice_body_1: Estas historias están escritas para leerse en orden. Cada serie es su propio camino — puedes comenzar cualquier serie cuando quieras, pero dentro de una serie sigues las partes desde la primera.
notice_body_2: Al llegar al final de una parte, se te pedirá que te quedes con ella treinta segundos antes de continuar. Una vez que hayas leído una serie completa, eres libre de regresar a cualquier parte en cualquier momento.
notice_body_3: Siempre puedes restablecer tu progreso y volver a empezar.
