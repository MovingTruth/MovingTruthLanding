notice_title: ก่อนเริ่มต้น
notice_body_1: เรื่องราวเหล่านี้เขียนขึ้นเพื่อให้อ่านตามลำดับ แต่ละชุดเรื่องเป็นเส้นทางของตัวเอง — คุณสามารถเริ่มชุดใดก็ได้ที่ต้องการ แต่ภายในชุดเรื่อง ให้ทำตามชิ้นส่วนตั้งแต่ชิ้นแรก
notice_body_2: เมื่อคุณถึงจุดสิ้นสุดของแต่ละชิ้น คุณจะถูกขอให้นั่งอยู่กับมันสักสามสิบวินาทีก่อนดำเนินต่อ เมื่ออ่านชุดเรื่องจบแล้ว คุณสามารถกลับไปยังส่วนใดก็ได้เมื่อใดก็ได้
notice_body_3: คุณสามารถรีเซ็ตความคืบหน้าและอ่านใหม่อีกครั้งได้เสมอ
