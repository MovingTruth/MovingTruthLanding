notice_title: Прежде чем начать
notice_body_1: Эти истории написаны для последовательного чтения. Каждая серия — это собственный путь. Ты можешь начать любую серию в любое время, но внутри серии следуй частям с самой первой.
notice_body_2: Когда ты достигнешь конца части, тебя попросят побыть с ней тридцать секунд перед тем, как двигаться дальше. После прочтения всей серии ты можешь вернуться к любой части в любое время.
notice_body_3: Ты всегда можешь сбросить прогресс и пройти путь заново.
