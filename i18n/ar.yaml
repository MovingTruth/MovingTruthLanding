reset_confirm: "إعادة تعيين كل تقدم القراءة في جميع المتسلسلات؟ ستبدأ من جديد."

notice_title: قبل أن تبدأ
notice_body_1: كُتبت هذه المقالات لتُقرأ بالترتيب. كل متسلسلة مسار مستقل — يمكنك البدء بأي متسلسلة تختارها، لكن داخل المتسلسلة تتبع الأجزاء من الأول.
notice_body_2: حين تصل إلى نهاية كل جزء، ستُطلب منك لحظة للتأمل — ثلاثون ثانية — قبل المتابعة. حين تقرأ المتسلسلة كاملةً، يمكنك العودة إلى أي جزء في أي وقت.
notice_body_3: يمكنك دائمًا إعادة تعيين تقدمك والمرور بها من جديد.
notice_btn: أنا مستعد

